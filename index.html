<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discord Tool Box</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --blue:   #5865F2;
    --violet: #7c3aed;
    --deep:   #080910;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    background: var(--deep);
    color: #e8eaf0;
    font-family: 'Syne', sans-serif;
    overflow: hidden;
    cursor: none;
  }

  /* ── cursor ─────────────────────────────────────────────────────────────── */
  #cur-dot {
    position: fixed; z-index: 9999; pointer-events: none;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #fff;
    transform: translate(-50%, -50%);
    box-shadow: 0 0 10px 3px rgba(88,101,242,0.8);
    transition: width .12s, height .12s, background .12s;
  }
  #cur-ring {
    position: fixed; z-index: 9998; pointer-events: none;
    width: 38px; height: 38px;
    border-radius: 50%;
    border: 1.5px solid rgba(88,101,242,0.55);
    transform: translate(-50%, -50%);
    transition: border-color .2s;
  }

  /* ── canvas ── */
  #bg { position: fixed; inset: 0; z-index: 0; }

  /* ── soft vignette ── */
  #vig {
    position: fixed; inset: 0; z-index: 2; pointer-events: none;
    background: radial-gradient(ellipse at 50% 50%, transparent 35%, rgba(5,6,14,0.75) 100%);
  }

  /* ── layout ── */
  #app {
    position: relative; z-index: 3;
    width: 100%; height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }

  /* ── eyebrow ── */
  .eyebrow {
    display: flex; align-items: center; gap: 14px;
    font-family: 'DM Mono', monospace;
    font-size: 11px; letter-spacing: .28em; text-transform: uppercase;
    color: rgba(88,101,242,0.65);
    margin-bottom: 24px;
    opacity: 0; animation: fadeUp .5s .25s forwards;
  }
  .eyebrow::before, .eyebrow::after {
    content: ''; width: 28px; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(88,101,242,0.5));
  }
  .eyebrow::after { background: linear-gradient(90deg, rgba(88,101,242,0.5), transparent); }

  /* ── title ── */
  .title-wrap {
    text-align: center;
    opacity: 0; animation: fadeUp .65s .45s forwards;
    will-change: transform;
  }

  .glitch-outer { position: relative; display: inline-block; }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(52px, 9.5vw, 118px);
    font-weight: 800;
    line-height: .95;
    letter-spacing: -.02em;
    background: linear-gradient(145deg, #e0e4ff 0%, #a5b4fc 25%, #5865F2 55%, #c084fc 85%, #a78bfa 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    position: relative; user-select: none;
    filter: drop-shadow(0 0 40px rgba(88,101,242,0.35));
  }

  .glitch-layer {
    position: absolute; inset: 0;
    font-family: 'Syne', sans-serif;
    font-size: clamp(52px, 9.5vw, 118px);
    font-weight: 800; line-height: .95; letter-spacing: -.02em;
    -webkit-text-fill-color: transparent; background-clip: text; -webkit-background-clip: text;
    pointer-events: none; opacity: 0;
  }
  .gl-r { background: linear-gradient(145deg, #ff5577, #ff2244); mix-blend-mode: screen; }
  .gl-b { background: linear-gradient(145deg, #44aaff, #2255ff); mix-blend-mode: screen; }

  /* ── under title ── */
  .under-title {
    display: flex; align-items: center; gap: 14px;
    margin-top: 12px;
    opacity: 0; animation: fadeUp .5s .7s forwards;
  }
  .under-title span {
    font-family: 'DM Mono', monospace;
    font-size: 11px; letter-spacing: .18em; text-transform: uppercase;
    color: rgba(165,180,252,0.32);
  }
  .under-title .sep {
    width: 3px; height: 3px; border-radius: 50%;
    background: rgba(88,101,242,0.35);
  }

  /* ── sub ── */
  .sub {
    margin-top: 28px; text-align: center;
    opacity: 0; animation: fadeUp .6s .9s forwards;
    max-width: 480px; padding: 0 24px;
  }
  .sub p {
    font-size: 15px; font-weight: 400;
    color: rgba(190,200,255,0.5); line-height: 1.75;
  }
  .sub strong { color: #818cf8; font-weight: 700; }

  /* ── rule ── */
  .h-rule {
    display: flex; align-items: center; gap: 16px;
    margin: 30px 0; width: 320px;
    opacity: 0; animation: fadeUp .4s 1.05s forwards;
  }
  .h-rule .ln { flex: 1; height: 1px; background: rgba(88,101,242,0.12); }
  .h-rule .dia {
    width: 5px; height: 5px; transform: rotate(45deg);
    background: rgba(88,101,242,0.45);
  }

  /* ── countdown ── */
  .countdown-wrap {
    opacity: 0; animation: fadeUp .6s 1.15s forwards; text-align: center;
  }
  .cd-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px; letter-spacing: .3em; text-transform: uppercase;
    color: rgba(165,180,252,0.25); margin-bottom: 16px;
  }
  .countdown { display: flex; gap: 10px; align-items: flex-start; justify-content: center; }
  .cd-unit   { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .cd-num {
    font-family: 'DM Mono', monospace;
    font-size: clamp(26px, 3.4vw, 40px);
    color: #dde0ff;
    width: 70px; text-align: center; padding: 12px 0;
    background: rgba(88,101,242,0.06);
    border: 1px solid rgba(88,101,242,0.16);
    border-radius: 10px;
    position: relative; overflow: hidden;
    letter-spacing: .04em;
  }
  .cd-num::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(88,101,242,0.45), transparent);
  }
  .cd-num .scan {
    position: absolute; left: 0; right: 0; height: 1px;
    background: rgba(88,101,242,0.18);
    animation: scanDown 3s linear infinite;
  }
  @keyframes scanDown {
    0%   { top: -2px; opacity: 0; }
    15%  { opacity: 1; }
    85%  { opacity: 1; }
    100% { top: 102%; opacity: 0; }
  }
  .cd-lbl {
    font-family: 'DM Mono', monospace;
    font-size: 8.5px; letter-spacing: .18em; text-transform: uppercase;
    color: rgba(165,180,252,0.22);
  }
  .cd-sep {
    font-size: 24px; color: rgba(88,101,242,0.28);
    margin-top: 10px; font-weight: 300;
    animation: blink 2s step-end infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* ── footer ── */
  footer {
    position: fixed; bottom: 0; left: 0; right: 0;
    padding: 16px 28px; z-index: 5;
    display: flex; align-items: center; justify-content: space-between;
    border-top: 1px solid rgba(88,101,242,0.06);
    opacity: 0; animation: fadeIn .5s 1.6s forwards;
  }
  footer .fl {
    font-family: 'DM Mono', monospace;
    font-size: 10px; color: rgba(165,180,252,0.2); letter-spacing: .07em;
  }
  footer .fr { display: flex; align-items: center; gap: 12px; }
  .beta-pill {
    font-family: 'DM Mono', monospace;
    font-size: 9px; letter-spacing: .2em; text-transform: uppercase;
    color: #f59e0b;
    border: 1px solid rgba(245,158,11,0.25); padding: 3px 11px;
    border-radius: 20px; background: rgba(245,158,11,0.05);
  }
  .ver {
    font-family: 'DM Mono', monospace;
    font-size: 10px; color: rgba(88,101,242,0.3); letter-spacing: .07em;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
</style>
</head>
<body>

<canvas id="bg"></canvas>
<div id="vig"></div>
<div id="cur-dot"></div>
<div id="cur-ring"></div>

<div id="app">
  <div class="eyebrow">Open Source · Discord Utilities</div>

  <div class="title-wrap" id="titleWrap">
    <div class="glitch-outer">
      <h1 id="h1">Discord Tool Box</h1>
      <div class="glitch-layer gl-r" id="glR">Discord Tool Box</div>
      <div class="glitch-layer gl-b" id="glB">Discord Tool Box</div>
    </div>
  </div>

  <div class="under-title">
    <span>©</span><div class="sep"></div>
    <span>bruesk_mardin</span><div class="sep"></div>
    <span>2026</span>
  </div>

  <div class="sub">
    <p>A new project — powered by the Lead Developer <strong>bruesk_mardin</strong>.</p>
  </div>

  <div class="h-rule">
    <div class="ln"></div><div class="dia"></div><div class="ln"></div>
  </div>

  <div class="countdown-wrap">
    <div class="cd-label">Expected Release In</div>
    <div class="countdown">
      <div class="cd-unit"><div class="cd-num" id="cd-d"><div class="scan"></div>00</div><div class="cd-lbl">Days</div></div>
      <div class="cd-sep">:</div>
      <div class="cd-unit"><div class="cd-num" id="cd-h"><div class="scan"></div>00</div><div class="cd-lbl">Hours</div></div>
      <div class="cd-sep">:</div>
      <div class="cd-unit"><div class="cd-num" id="cd-m"><div class="scan"></div>00</div><div class="cd-lbl">Mins</div></div>
      <div class="cd-sep">:</div>
      <div class="cd-unit"><div class="cd-num" id="cd-s"><div class="scan"></div>00</div><div class="cd-lbl">Secs</div></div>
    </div>
  </div>
</div>

<footer>
  <span class="fl">© bruesk_mardin 2026 — All rights reserved</span>
  <div class="fr">
    <span class="ver">v0.1.0</span>
    <span class="beta-pill">Beta</span>
  </div>
</footer>

<script>
// ── countdown ────────────────────────────────────────────────────────────────
const RELEASE = new Date('2026-03-10T00:00:00').getTime();
function pad(n) { return String(Math.floor(n)).padStart(2,'0'); }
function tick() {
  const d = Math.max(0, RELEASE - Date.now());
  const set = (id, v) => {
    const el = document.getElementById(id), sc = el.querySelector('.scan');
    el.textContent = pad(v); el.appendChild(sc);
  };
  set('cd-d', d/86400000); set('cd-h', (d%86400000)/3600000);
  set('cd-m', (d%3600000)/60000); set('cd-s', (d%60000)/1000);
}
tick(); setInterval(tick, 1000);

// ── smooth cursor ─────────────────────────────────────────────────────────────
const dot  = document.getElementById('cur-dot');
const ring = document.getElementById('cur-ring');
let mx=-999, my=-999, rx=-999, ry=-999;
document.addEventListener('mousemove', e => { mx=e.clientX; my=e.clientY; });

(function cursorLoop() {
  // dot snaps instantly
  dot.style.left = mx+'px'; dot.style.top = my+'px';
  // ring lerps smoothly
  rx += (mx-rx) * 0.12;
  ry += (my-ry) * 0.12;
  ring.style.left = rx+'px'; ring.style.top = ry+'px';
  requestAnimationFrame(cursorLoop);
})();

// ── title 3D tilt ─────────────────────────────────────────────────────────────
const titleWrap = document.getElementById('titleWrap');
let trx=0,try_=0,ttx=0,tty=0, crx=0,cry=0,ctx2=0,cty=0;
let ready=false; setTimeout(()=>ready=true, 900);
document.addEventListener('mousemove', e => {
  if(!ready) return;
  const dx=(e.clientX/innerWidth-.5)*2, dy=(e.clientY/innerHeight-.5)*2;
  trx=dy*-11; try_=dx*11; ttx=dx*9; tty=dy*9;
});
(function tiltLoop() {
  crx+=(trx-crx)*.055; cry+=(try_-cry)*.055;
  ctx2+=(ttx-ctx2)*.055; cty+=(tty-cty)*.055;
  titleWrap.style.transform=`perspective(900px) rotateX(${crx}deg) rotateY(${cry}deg) translate(${ctx2}px,${cty}px)`;
  requestAnimationFrame(tiltLoop);
})();

// ── glitch ────────────────────────────────────────────────────────────────────
const glR=document.getElementById('glR'), glB=document.getElementById('glB');

function glitch() {
  setTimeout(()=>{ fireGlitch(); glitch(); }, 1800+Math.random()*4000);
}
function fireGlitch() {
  let f=0; const frames=8+Math.floor(Math.random()*10);
  const id=setInterval(()=>{
    if(++f>=frames){
      clearInterval(id);
      [glR,glB].forEach(g=>{ g.style.opacity='0'; g.style.transform='none'; g.style.clipPath='none'; });
      return;
    }
    const y1=Math.random()*80, h=4+Math.random()*28, y2=Math.min(100,y1+h);
    const sr=(Math.random()-.5)*16, sb=(Math.random()-.5)*16, sy=(Math.random()-.5)*5;
    glR.style.opacity  =(0.55+Math.random()*0.45).toString();
    glB.style.opacity  =(0.45+Math.random()*0.45).toString();
    glR.style.transform=`translate(${sr}px,${sy}px)`;
    glB.style.transform=`translate(${sb}px,${-sy}px)`;
    glR.style.clipPath =`polygon(0 ${y1}%,100% ${y1}%,100% ${y2}%,0 ${y2}%)`;
    glB.style.clipPath =`polygon(0 ${y1+1.5}%,100% ${y1-1.5}%,100% ${y2-1.5}%,0 ${y2+1.5}%)`;
  }, 16);
}
glitch();
document.addEventListener('mousemove', e => {
  const r=titleWrap.getBoundingClientRect();
  const d=Math.hypot(e.clientX-r.left-r.width/2, e.clientY-r.top-r.height/2);
  if(d<90 && Math.random()>.93) fireGlitch();
});

// ── canvas background ─────────────────────────────────────────────────────────
const canvas=document.getElementById('bg');
const ctx=canvas.getContext('2d');
let W,H;
function resize(){ W=canvas.width=innerWidth; H=canvas.height=innerHeight; }
resize(); window.addEventListener('resize',resize);

function col(hex,a){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

const PAL=['#5865F2','#7c3aed','#4752c4','#818cf8','#6d28d9','#a78bfa'];

// ── slow breathing mesh blobs ─────────────────────────────────────────────────
class Blob {
  constructor() {
    this.x  = Math.random()*W;
    this.y  = Math.random()*H;
    this.tx = this.x; this.ty = this.y;
    this.r  = 200+Math.random()*350;
    this.a  = 0.018+Math.random()*0.032;
    this.c  = PAL[Math.floor(Math.random()*PAL.length)];
    this.phase = Math.random()*Math.PI*2;
    this.speed = 0.0003+Math.random()*0.0004;
    // target wander
    this.wx = this.x; this.wy = this.y;
    setInterval(()=>{
      this.wx = 100+Math.random()*(W-200);
      this.wy = 100+Math.random()*(H-200);
    }, 4000+Math.random()*5000);
  }
  draw(t) {
    // smooth wander toward target
    this.x += (this.wx - this.x) * 0.003;
    this.y += (this.wy - this.y) * 0.003;

    // subtle mouse pull
    const dx=mx-this.x, dy=my-this.y, d=Math.hypot(dx,dy);
    if(d<500){ this.x+=dx/d*0.3; this.y+=dy/d*0.3; }

    const pulse = 1+Math.sin(t*this.speed+this.phase)*0.12;
    const r = this.r * pulse;

    const g = ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,r);
    g.addColorStop(0, col(this.c, this.a));
    g.addColorStop(0.5, col(this.c, this.a*0.4));
    g.addColorStop(1, col(this.c, 0));
    ctx.beginPath(); ctx.arc(this.x,this.y,r,0,Math.PI*2);
    ctx.fillStyle=g; ctx.fill();
  }
}

// ── small magnetic particles ──────────────────────────────────────────────────
class Particle {
  constructor() {
    this.ox=Math.random()*W; this.oy=Math.random()*H;
    this.x=this.ox; this.y=this.oy;
    this.r=1.8+Math.random()*2.8;
    this.vx=(Math.random()-.5)*.3; this.vy=(Math.random()-.5)*.3;
    this.c=PAL[Math.floor(Math.random()*PAL.length)];
    this.a=0.25+Math.random()*0.5;
    this.po=Math.random()*Math.PI*2;
  }
  draw(t) {
    const dx=mx-this.x, dy=my-this.y, dist=Math.hypot(dx,dy);
    const PULL=150;
    if(dist<PULL && dist>0.1){
      const f=(1-dist/PULL);
      this.vx+=dx/dist*f*f*0.8;
      this.vy+=dy/dist*f*f*0.8;
    } else {
      this.vx+=(this.ox-this.x)*0.003;
      this.vy+=(this.oy-this.y)*0.003;
    }
    this.vx*=0.9; this.vy*=0.9;
    this.x+=this.vx; this.y+=this.vy;
    const pulse=0.55+Math.sin(t*0.0013+this.po)*0.45;
    const al=this.a*pulse;
    // glow
    const g=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.r*5.5);
    g.addColorStop(0,col(this.c,al*0.7)); g.addColorStop(1,col(this.c,0));
    ctx.beginPath(); ctx.arc(this.x,this.y,this.r*5.5,0,Math.PI*2);
    ctx.fillStyle=g; ctx.fill();
    // core
    ctx.beginPath(); ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
    ctx.fillStyle=col(this.c,Math.min(1,al*1.6)); ctx.fill();
  }
}

// ── subtle connecting lines between nearby particles ──────────────────────────
function drawConnections(pts) {
  for(let i=0;i<pts.length;i++){
    for(let j=i+1;j<pts.length;j++){
      const dx=pts[i].x-pts[j].x, dy=pts[i].y-pts[j].y;
      const d=Math.hypot(dx,dy);
      if(d<120){
        const a=(1-d/120)*0.06;
        ctx.beginPath();
        ctx.moveTo(pts[i].x,pts[i].y); ctx.lineTo(pts[j].x,pts[j].y);
        ctx.strokeStyle=`rgba(88,101,242,${a})`; ctx.lineWidth=1; ctx.stroke();
      }
    }
  }
}

// ── mouse glow ────────────────────────────────────────────────────────────────
function drawMouseGlow() {
  if(mx<0) return;
  const g=ctx.createRadialGradient(mx,my,0,mx,my,240);
  g.addColorStop(0,'rgba(88,101,242,0.09)'); g.addColorStop(1,'rgba(88,101,242,0)');
  ctx.beginPath(); ctx.arc(mx,my,240,0,Math.PI*2); ctx.fillStyle=g; ctx.fill();
}

// ── faint grid ────────────────────────────────────────────────────────────────
function drawGrid() {
  ctx.strokeStyle='rgba(88,101,242,0.025)'; ctx.lineWidth=1;
  const s=60;
  for(let x=0;x<W;x+=s){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for(let y=0;y<H;y+=s){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
}

const blobs     = Array.from({length:7},  ()=>new Blob());
const particles = Array.from({length:32}, ()=>new Particle());

(function loop(t) {
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#080910'; ctx.fillRect(0,0,W,H);

  drawGrid();
  blobs.forEach(b=>b.draw(t));
  drawMouseGlow();
  drawConnections(particles);
  particles.forEach(p=>p.draw(t));

  requestAnimationFrame(loop);
})(0);
</script>
</body>
</html>
