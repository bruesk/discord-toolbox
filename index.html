!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discord Tool Box</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --blue:   #5865F2;
    --indigo: #4752c4;
    --violet: #7c3aed;
    --deep:   #0b0c1a;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    background: var(--deep);
    color: #e8eaf0;
    font-family: 'Syne', sans-serif;
    overflow: hidden;
    cursor: none;
  }

  #cursor {
    position: fixed; width: 10px; height: 10px;
    background: var(--blue); border-radius: 50%;
    pointer-events: none; z-index: 9999;
    transform: translate(-50%,-50%);
    mix-blend-mode: screen;
  }
  #cursor-ring {
    position: fixed; width: 34px; height: 34px;
    border: 1.5px solid rgba(88,101,242,0.45); border-radius: 50%;
    pointer-events: none; z-index: 9998;
    transform: translate(-50%,-50%);
  }

  #bg { position: fixed; inset: 0; z-index: 0; }

  body::after {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 1; opacity: 0.35;
  }

  #app {
    position: relative; z-index: 2;
    width: 100%; height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }

  .badge {
    font-family: 'DM Mono', monospace;
    font-size: 11px; letter-spacing: .2em; text-transform: uppercase;
    color: var(--blue);
    border: 1px solid rgba(88,101,242,0.3);
    padding: 5px 14px; border-radius: 100px; margin-bottom: 30px;
    background: rgba(88,101,242,0.07);
    opacity: 0; animation: fadeUp .6s .2s forwards;
  }

  .title-wrap {
    position: relative; text-align: center;
    opacity: 0; animation: fadeUp .7s .4s forwards;
    will-change: transform;
  }

  h1 {
    font-size: clamp(48px, 8.5vw, 106px);
    font-weight: 800; line-height: .95; letter-spacing: -.03em;
    background: linear-gradient(135deg, #a5b4fc 0%, #5865F2 35%, #818cf8 60%, #c084fc 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    position: relative; user-select: none;
  }
  h1::before, h1::after {
    content: attr(data-text); position: absolute; inset: 0;
    background: linear-gradient(135deg, #a5b4fc 0%, #5865F2 35%, #818cf8 60%, #c084fc 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  h1::before { animation: glitch1 6s infinite; clip-path: polygon(0 20%,100% 20%,100% 40%,0 40%); }
  h1::after  { animation: glitch2 6s infinite; clip-path: polygon(0 60%,100% 60%,100% 75%,0 75%); }

  .copyright {
    font-family: 'DM Mono', monospace; font-size: 13px;
    color: rgba(165,180,252,0.45); margin-top: 6px; letter-spacing: .05em;
  }

  .sub {
    margin-top: 26px; text-align: center;
    opacity: 0; animation: fadeUp .7s .65s forwards;
    max-width: 460px; padding: 0 20px;
  }
  .sub p { font-size: 15.5px; color: rgba(200,205,255,0.6); line-height: 1.65; }
  .sub strong { color: #a5b4fc; font-weight: 700; }

  .divider {
    width: 1px; height: 38px;
    background: linear-gradient(to bottom, transparent, rgba(88,101,242,0.4), transparent);
    margin: 30px auto;
    opacity: 0; animation: fadeUp .5s .85s forwards;
  }

  .countdown-wrap { opacity: 0; animation: fadeUp .7s 1s forwards; text-align: center; }
  .countdown-label {
    font-family: 'DM Mono', monospace; font-size: 10px;
    letter-spacing: .25em; text-transform: uppercase;
    color: rgba(165,180,252,0.35); margin-bottom: 14px;
  }
  .countdown { display: flex; gap: 10px; align-items: center; justify-content: center; }
  .cd-unit   { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .cd-num {
    font-family: 'DM Mono', monospace;
    font-size: clamp(26px, 3.5vw, 40px); font-weight: 500; color: #e8eaf0;
    background: rgba(88,101,242,0.1); border: 1px solid rgba(88,101,242,0.2);
    border-radius: 10px; width: 68px; text-align: center; padding: 10px 0;
    position: relative; overflow: hidden;
  }
  .cd-num::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(88,101,242,0.55), transparent);
  }
  .cd-lbl {
    font-family: 'DM Mono', monospace; font-size: 9px;
    letter-spacing: .15em; text-transform: uppercase; color: rgba(165,180,252,0.3);
  }
  .cd-sep { font-size: 26px; color: rgba(88,101,242,0.35); margin-bottom: 18px; font-weight: 300; }

  footer {
    position: fixed; bottom: 0; left: 0; right: 0;
    padding: 18px 30px;
    display: flex; align-items: center; justify-content: space-between;
    z-index: 3; opacity: 0; animation: fadeUp .6s 1.3s forwards;
    border-top: 1px solid rgba(88,101,242,0.07);
  }
  footer span { font-family: 'DM Mono', monospace; font-size: 11px; color: rgba(165,180,252,0.28); letter-spacing: .05em; }
  .beta-tag {
    font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: .15em; text-transform: uppercase;
    color: #f59e0b; border: 1px solid rgba(245,158,11,0.3); padding: 3px 10px;
    border-radius: 4px; background: rgba(245,158,11,0.06);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes glitch1 {
    0%,94%,100% { transform: translateX(0); opacity: 0; }
    95% { transform: translateX(-4px); opacity: .8; }
    96% { transform: translateX(4px);  opacity: .8; }
    97% { transform: translateX(-2px); opacity: .8; }
    98% { transform: translateX(0);    opacity: 0; }
  }
  @keyframes glitch2 {
    0%,94%,100% { transform: translateX(0); opacity: 0; }
    95% { transform: translateX(4px);  opacity: .6; }
    96% { transform: translateX(-4px); opacity: .6; }
    97% { transform: translateX(2px);  opacity: .6; }
    98% { transform: translateX(0);    opacity: 0; }
  }
</style>
</head>
<body>

<canvas id="bg"></canvas>
<div id="cursor"></div>
<div id="cursor-ring"></div>

<div id="app">
  <div class="badge">Open Source · Discord Utilities</div>

  <div class="title-wrap" id="titleWrap">
    <h1 data-text="Discord Tool Box">Discord Tool Box</h1>
    <div class="copyright">©</div>
  </div>

  <div class="sub">
    <p>A new project — powered by the Lead Developer <strong>bruesk_mardin</strong>.</p>
  </div>

  <div class="divider"></div>

  <div class="countdown-wrap">
    <div class="countdown-label">Expected Release In</div>
    <div class="countdown">
      <div class="cd-unit"><div class="cd-num" id="cd-d">00</div><div class="cd-lbl">Days</div></div>
      <div class="cd-sep">:</div>
      <div class="cd-unit"><div class="cd-num" id="cd-h">00</div><div class="cd-lbl">Hours</div></div>
      <div class="cd-sep">:</div>
      <div class="cd-unit"><div class="cd-num" id="cd-m">00</div><div class="cd-lbl">Minutes</div></div>
      <div class="cd-sep">:</div>
      <div class="cd-unit"><div class="cd-num" id="cd-s">00</div><div class="cd-lbl">Seconds</div></div>
    </div>
  </div>
</div>

<footer>
  <span>© bruesk_mardin 2026</span>
  <span class="beta-tag">Beta</span>
</footer>

<script>
// ── countdown to 10 March 2026 ────────────────────────────────────────────────
const RELEASE = new Date('2026-03-10T00:00:00').getTime();
function pad(n) { return String(Math.floor(n)).padStart(2,'0'); }
function tick() {
  const diff = Math.max(0, RELEASE - Date.now());
  document.getElementById('cd-d').textContent = pad(diff / 86400000);
  document.getElementById('cd-h').textContent = pad((diff % 86400000) / 3600000);
  document.getElementById('cd-m').textContent = pad((diff % 3600000)  / 60000);
  document.getElementById('cd-s').textContent = pad((diff % 60000)    / 1000);
}
tick(); setInterval(tick, 1000);

// ── cursor ────────────────────────────────────────────────────────────────────
const cur  = document.getElementById('cursor');
const ring = document.getElementById('cursor-ring');
let mx = -999, my = -999, rx = -999, ry = -999;
document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
(function animCursor() {
  rx += (mx - rx) * .15; ry += (my - ry) * .15;
  cur.style.left  = mx + 'px'; cur.style.top  = my + 'px';
  ring.style.left = rx + 'px'; ring.style.top = ry + 'px';
  requestAnimationFrame(animCursor);
})();

// ── title mouse tilt ──────────────────────────────────────────────────────────
const titleWrap = document.getElementById('titleWrap');
let titleReady = false;
setTimeout(() => titleReady = true, 900);
let curTiltX = 0, curTiltY = 0, curTX = 0, curTY = 0;
let tgtTiltX = 0, tgtTiltY = 0, tgtTX = 0, tgtTY = 0;

document.addEventListener('mousemove', e => {
  if (!titleReady) return;
  const dx = (e.clientX / window.innerWidth  - .5) * 2;
  const dy = (e.clientY / window.innerHeight - .5) * 2;
  tgtTiltX = dy * -10;
  tgtTiltY = dx *  10;
  tgtTX    = dx *  9;
  tgtTY    = dy *  9;
});

(function animTitle() {
  curTiltX += (tgtTiltX - curTiltX) * .07;
  curTiltY += (tgtTiltY - curTiltY) * .07;
  curTX    += (tgtTX    - curTX)    * .07;
  curTY    += (tgtTY    - curTY)    * .07;
  titleWrap.style.transform = `perspective(700px) rotateX(${curTiltX}deg) rotateY(${curTiltY}deg) translate(${curTX}px,${curTY}px)`;
  requestAnimationFrame(animTitle);
})();

// ── canvas ────────────────────────────────────────────────────────────────────
const canvas = document.getElementById('bg');
const ctx    = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize(); window.addEventListener('resize', resize);

const COLORS = ['#5865F2','#7c3aed','#818cf8','#4752c4','#a5b4fc'];
function rgba(hex, a) {
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

// ── large atmospheric orbs ────────────────────────────────────────────────────
class Orb {
  constructor() { this.init(true); }
  init(rand) {
    this.x  = Math.random() * W;
    this.y  = rand ? Math.random() * H : H + 160;
    this.r  = 110 + Math.random() * 210;
    this.vx = (Math.random() - .5) * .18;
    this.vy = -(.07 + Math.random() * .15);
    this.a  = .025 + Math.random() * .05;
    this.c  = COLORS[Math.floor(Math.random() * COLORS.length)];
    this.p  = Math.random() * Math.PI * 2;
  }
  draw() {
    this.p += .005;
    const r = this.r * (1 + Math.sin(this.p) * .04);
    const dx = mx - this.x, dy = my - this.y, d = Math.sqrt(dx*dx+dy*dy);
    if (d < 400) { this.x += dx/d*.25; this.y += dy/d*.25; }
    this.x += this.vx; this.y += this.vy;
    if (this.y + r < -60) this.init(false);
    const g = ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,r);
    g.addColorStop(0, rgba(this.c, this.a));
    g.addColorStop(1, rgba(this.c, 0));
    ctx.beginPath(); ctx.arc(this.x,this.y,r,0,Math.PI*2);
    ctx.fillStyle = g; ctx.fill();
  }
}

// ── small magnetic particles ──────────────────────────────────────────────────
class Particle {
  constructor() { this.init(); }
  init() {
    this.ox = Math.random() * W;
    this.oy = Math.random() * H;
    this.x  = this.ox; this.y = this.oy;
    this.r  = 1.8 + Math.random() * 3;
    this.vx = (Math.random() - .5) * .3;
    this.vy = (Math.random() - .5) * .3;
    this.c  = COLORS[Math.floor(Math.random() * COLORS.length)];
    this.a  = .25 + Math.random() * .55;
    this.po = Math.random() * Math.PI * 2;
  }
  draw(t) {
    const dx = mx - this.x, dy = my - this.y;
    const dist = Math.sqrt(dx*dx+dy*dy);
    const PULL = 140;

    if (dist < PULL) {
      const f = (1 - dist/PULL);
      this.vx += (dx/dist) * f * f * 0.7;
      this.vy += (dy/dist) * f * f * 0.7;
    } else {
      // spring back to origin
      this.vx += (this.ox - this.x) * 0.004;
      this.vy += (this.oy - this.y) * 0.004;
    }

    this.vx *= 0.9; this.vy *= 0.9;
    this.x += this.vx; this.y += this.vy;

    const pulse = .65 + Math.sin(t*.0015 + this.po) * .35;
    const alpha = this.a * pulse;

    // glow halo
    const g = ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.r*5);
    g.addColorStop(0, rgba(this.c, alpha * .7));
    g.addColorStop(1, rgba(this.c, 0));
    ctx.beginPath(); ctx.arc(this.x,this.y,this.r*5,0,Math.PI*2);
    ctx.fillStyle = g; ctx.fill();

    // solid core
    ctx.beginPath(); ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
    ctx.fillStyle = rgba(this.c, Math.min(1, alpha * 1.4));
    ctx.fill();
  }
}

const orbs      = Array.from({length: 9},  () => new Orb());
const particles = Array.from({length: 30}, () => new Particle());

function drawGrid() {
  ctx.strokeStyle = 'rgba(88,101,242,0.033)'; ctx.lineWidth = 1;
  const s = 55;
  for (let x=0;x<W;x+=s){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for (let y=0;y<H;y+=s){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
}

function drawMouseGlow() {
  if (mx < 0) return;
  const g = ctx.createRadialGradient(mx,my,0,mx,my,220);
  g.addColorStop(0,'rgba(88,101,242,0.11)'); g.addColorStop(1,'rgba(88,101,242,0)');
  ctx.beginPath(); ctx.arc(mx,my,220,0,Math.PI*2); ctx.fillStyle=g; ctx.fill();
}

(function loop(t) {
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#0b0c1a'; ctx.fillRect(0,0,W,H);
  drawGrid();
  orbs.forEach(o => o.draw());
  drawMouseGlow();
  particles.forEach(p => p.draw(t));
  requestAnimationFrame(loop);
})(0);
</script>
</body>
</html>
